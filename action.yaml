name: 'Validate tag format and if tag/image exist'
description: 'Validates git tag format, checks if git tag exists, check if image with tag exists'
inputs:
  tag:
    description: 'Git/ image tag'
    required: true
  ECR_REGISTRY:
    description: 'ECR registry where image can be found'
    required: true
  aws-account: 
    description: 'Aws account to assume'
    required: false
    default: 'bisnow'
  aws-region:
    description: 'aws region where ECR repo is'
    required: false
    default: 'us-east-1'


runs:
  using: 'composite'
  steps:
    - name: Validate tag format
      id: validate
      shell: bash
      run: |
        TAG="${{ inputs.tag }}"

        # Check if tag is a release candidate (rc-*)
        if [[ "$TAG" =~ ^rc-[0-9]+$ ]]; then
          echo "✅ Valid release candidate tag format: $TAG"
          echo "is_rc=true" >> $GITHUB_OUTPUT
        # Check if tag starts with 'v' and follows semantic versioning pattern
        elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
          echo "✅ Valid semantic version tag format: $TAG"
          echo "is_rc=false" >> $GITHUB_OUTPUT
        else
          echo "❌ Invalid tag format: $TAG"
          echo "Tag must either start with 'v' and follow semantic versioning (e.g., v1.0.0) or be a release candidate (e.g., rc-123)"
          exit 1
        fi

    - name: Checkout Repository
      if: steps.validate.outputs.is_rc == 'false'
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Check if git tag exists
      if: steps.validate.outputs.is_rc == 'false'
      shell: bash
      run: |
        TAG="${{ inputs.tag }}"

        # Check if the tag exists locally
        if git rev-parse "$TAG" >/dev/null 2>&1; then
          echo "✅ Tag $TAG exists locally"
        else
          # Try to fetch the tag from remote
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "✅ Tag $TAG exists on remote"
          else
            echo "❌ Tag $TAG does not exist"
            exit 1
          fi
        fi

    - name: Wait for tag-release workflow
      if: steps.validate.outputs.is_rc == 'false'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${{ inputs.tag }}"
        echo "Waiting for tag-release workflow for $TAG..."
        for i in $(seq 1 40); do
          result=$(gh run list \
            --repo ${{ github.repository }} \
            --workflow=tag-release.yml \
            --json status,conclusion,headBranch \
            --jq "[.[] | select(.headBranch == \"$TAG\")] | .[0]")

          if [[ -z "$result" || "$result" == "null" ]]; then
            echo "No tag-release run found yet, retrying... ($i/40)"
            sleep 30
            continue
          fi

          status=$(echo "$result" | jq -r '.status')
          conclusion=$(echo "$result" | jq -r '.conclusion')
          echo "tag-release status: $status, conclusion: $conclusion"

          if [[ "$status" == "completed" && "$conclusion" == "success" ]]; then
            echo "✅ Tag-release completed. Image $TAG is ready in ECR."
            exit 0
          elif [[ "$status" == "completed" ]]; then
            echo "❌ Tag-release did not succeed (conclusion: $conclusion). Aborting."
            exit 1
          fi

          echo "Still in progress, retrying in 30s... ($i/40)"
          sleep 30
        done
        echo "❌ Timed out after 20 minutes waiting for tag-release."
        exit 1

    - name: Log into AWS
      uses: bisnow/github-actions-assume-role-for-environment@main
      with:
        aws-account: ${{ inputs.aws-account }}

    - name: Check if Docker image exists in ECR
      shell: bash
      run: |
        TAG="${{ inputs.tag }}"
        echo "Checking if image exists: ${{ inputs.ECR_REGISTRY }}:$TAG"

        # Extract repo name from registry URL (everything after first /)
        REPO_NAME="${{ inputs.ECR_REGISTRY }}"
        REPO_NAME="${REPO_NAME#*/}"
        echo "Repository name: $REPO_NAME"

        # Check if the image exists in ECR
        if aws ecr describe-images --repository-name "$REPO_NAME" --image-ids imageTag=$TAG --region ${{ inputs.aws-region }} >/dev/null 2>&1; then
          echo "✅ Image ${{ inputs.ECR_REGISTRY }}:$TAG exists in ECR"
        else
          echo "❌ Image ${{ inputs.ECR_REGISTRY }}:$TAG does not exist in ECR"
          echo "Please ensure the tag-release workflow has been run for this tag first."
          exit 1
        fi
